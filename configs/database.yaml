database:
  engine: postgresql
  host: ${DATABASE_HOST:-localhost}
  port: ${DATABASE_PORT:-5432}
  name: ${DATABASE_NAME:-bookworm}
  user: ${DATABASE_USER:-bookworm}
  password: ${DATABASE_PASSWORD:-bookworm}
  pool:
    min_size: 5
    max_size: 20
    max_overflow: 10
    timeout: 30
  options:
    connect_timeout: 10
    statement_timeout: 30000
    idle_in_transaction_session_timeout: 60000
